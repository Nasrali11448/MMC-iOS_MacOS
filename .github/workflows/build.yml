name: MMC-Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake

      - name: Verify Dobby files
        run: |
          echo "Checking third_party/Dobby contents..."
          ls -R third_party/Dobby

      - name: Build dylib
        run: |
          clang++ -dynamiclib \
            main.cpp \
            -Ithird_party/Dobby \
            third_party/Dobby/libdobby.a \
            -o libmmc.dylib

      - name: Verify dylib linkage (Dobby)
        run: |
          echo "=== otool -L ==="
          otool -L libmmc.dylib

          echo "=== nm (searching for Dobby symbols) ==="
          nm -gU libmmc.dylib | grep -i dobby || true

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: dylib
          path: libmmc.dylib